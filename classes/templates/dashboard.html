<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Sales Dashboard</title>
    <link type="text/css" rel="stylesheet" href="/css/materialize.min.css" media="screen,projection"/>
    <link type="text/css" rel="stylesheet" href="/css/style.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>
<div class="container">
    <h2>Today's Sales</h2>
    <p>Transactions: <span id="txCount">0</span></p>
    <p>Revenue: ₹<span id="revenue">0</span></p>
    <p>Pending: <span id="pending">0</span></p>
</div>

<script type="text/javascript">
    function loadDashboard() {
        fetch("/dashboard-stats")
            .then(function (res) { return res.json(); })
            .then(function (data) {
                document.getElementById("txCount").innerText = data.transactions;
                document.getElementById("revenue").innerText = data.totalRevenue;
                document.getElementById("pending").innerText = data.pendingPayments;
            })
            .catch(function (err) {
                console.log("Failed to load dashboard stats", err);
            });
    }

    document.addEventListener("DOMContentLoaded", loadDashboard);
</script>
</body>
</html>
